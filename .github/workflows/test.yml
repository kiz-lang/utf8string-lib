name: Run Tests

# 触发条件：推送到任何分支，或创建 PR
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build-and-test:
    # 在 Ubuntu 最新版上运行
    runs-on: ubuntu-latest

    steps:
    # 检出代码
    - uses: actions/checkout@v4

    # 安装 CMake 和构建工具
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    # 创建构建目录并编译
    - name: Configure and Build
      run: |
        cmake -S . -B build
        cmake --build build --config Release

    # 运行测试
    - name: Run Tests
      working-directory: ./build
      run: ./utf8_test